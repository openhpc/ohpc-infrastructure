---
# NOTE: This playbook uses ansible.builtin.raw for all tasks because
# obs.openhpc.community runs Python 3.6 which is below the minimum
# Python 3.7 required by ansible-core 2.18 standard modules.

- name: Configure obs.openhpc.community webhook handler
  hosts: obs_server
  become: true
  gather_facts: false

  tasks:
    - name: Create webhook directory
      ansible.builtin.raw: >-
        mkdir -p /srv/www/trigger/webhooks
      changed_when: false

    - name: Deploy webhooks.py
      ansible.builtin.raw: |
        base64 -d << 'B64EOF' > /srv/www/trigger/webhooks/webhooks.py
        {{ lookup("file", "webhooks.py") | b64encode }}
        B64EOF
        chown root:root /srv/www/trigger/webhooks/webhooks.py
        chmod 0644 /srv/www/trigger/webhooks/webhooks.py
      changed_when: true

    - name: Deploy webhooks.json
      ansible.builtin.raw: |
        base64 -d << 'B64EOF' > /srv/www/trigger/webhooks/webhooks.json
        {{ lookup("file", "webhooks.json") | b64encode }}
        B64EOF
        chown root:root /srv/www/trigger/webhooks/webhooks.json
        chmod 0644 /srv/www/trigger/webhooks/webhooks.json
      changed_when: true

    - name: Deploy Apache trigger config
      ansible.builtin.raw: |
        base64 -d << 'B64EOF' > /etc/apache2/conf.d/trigger-python.conf
        {{ lookup("file", "trigger-python.conf") | b64encode }}
        B64EOF
        chown root:root /etc/apache2/conf.d/trigger-python.conf
        chmod 0644 /etc/apache2/conf.d/trigger-python.conf
      changed_when: true

    - name: Enable and start Apache
      ansible.builtin.raw: >-
        systemctl enable apache2 && systemctl restart apache2
      changed_when: true
